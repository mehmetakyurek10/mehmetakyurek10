name: Generate Snake Animation

# Bu kodun ne zaman çalışacağını belirliyoruz
on:
  schedule:
    # Her 12 saatte bir otomatik olarak çalışır ve yılanı günceller
    - cron: "0 */12 * * *"
  
  # Action'ı manuel olarak da çalıştırabilmemizi sağlar
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Yılan animasyonunu oluşturan aracı çekiyoruz
      - uses: Platane/snk@v3
        with:
          # GitHub kullanıcı adın
          github_user_name: ${{ github.repository_owner }}
          # Çıktı olarak üretilecek dosyalar ve temalar
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Oluşturulan resimleri "output" isimli bir dala (branch) yüklüyoruz
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
